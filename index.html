<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAGA FC - Pro Clubs Team</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);
            color: #fff;
            min-height: 100vh;
        }

        /* Header estilo EA Sports com tema roxo */
        .ea-bar {
            background: #000;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #9b4dff;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .ea-logo {
            color: #fff;
            font-weight: 700;
        }

        .ea-sports-text {
            color: #9b4dff;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .logo-img {
            max-width: 200px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(155, 77, 255, 0.5));
        }

        .logo-simbolo {
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: #fff;
            transform: rotate(5deg);
            box-shadow: 0 0 20px rgba(155, 77, 255, 0.5);
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff, #9b4dff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(155, 77, 255, 0.3);
        }

        .subtitle {
            color: #ccc;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .players-section {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            border-left: 5px solid #9b4dff;
            padding-left: 20px;
            max-width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .player-card {
            background: rgba(20, 15, 35, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(155, 77, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #9b4dff, transparent);
            transition: left 0.3s;
        }

        .player-card:hover::before {
            left: 100%;
        }

        .player-card:hover {
            transform: translateY(-10px);
            border-color: rgba(155, 77, 255, 0.5);
            box-shadow: 0 10px 30px rgba(155, 77, 255, 0.2);
        }

        .player-card.active {
            border: 2px solid #9b4dff;
            background: rgba(155, 77, 255, 0.1);
            box-shadow: 0 0 20px rgba(155, 77, 255, 0.3);
        }

        .player-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #9b4dff;
            margin-bottom: 15px;
            background: #2a1a4a;
        }

        .player-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a1a4a, #1a0a2e);
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 3px solid #9b4dff;
        }

        .player-card h3 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .player-card p {
            color: #9b4dff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .highlight-area {
            max-width: 900px;
            margin: 30px auto;
            background: linear-gradient(135deg, #0f0a1a, #1a0f2e);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid #9b4dff;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(155, 77, 255, 0.1);
        }

        .player-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            align-items: center;
        }

        .detail-photo {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }

        .detail-photo img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #9b4dff;
            background: #2a1a4a;
        }

        .detail-photo .placeholder-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a1a4a, #1a0a2e);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            border: 4px solid #9b4dff;
        }

        .detail-info {
            flex: 2;
        }

        .detail-info h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .detail-pos {
            color: #9b4dff;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .detail-bio {
            line-height: 1.6;
            margin-bottom: 20px;
            color: #ddd;
        }

        .highlight-link {
            display: inline-block;
            background: linear-gradient(135deg, #9b4dff, #6a1b9a);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .highlight-link:hover {
            background: linear-gradient(135deg, #b060ff, #7b2fbf);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(155, 77, 255, 0.5);
        }

        footer {
            text-align: center;
            padding: 30px;
            border-top: 1px solid #9b4dff33;
            margin-top: 50px;
            color: #888;
            font-size: 0.8rem;
        }

        /* Modal do vídeo */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            width: 80%;
            max-width: 900px;
            background: #111;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #9b4dff;
        }

        .modal-header {
            text-align: right;
            margin-bottom: 10px;
        }

        .close-modal {
            background: #ff3131;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .close-modal:hover {
            background: #cc0000;
        }

        .video-container iframe,
        .video-container video {
            width: 100%;
            border-radius: 15px;
        }

        .video-container video {
            max-height: 500px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .player-detail { flex-direction: column; text-align: center; }
            .detail-info { text-align: center; }
            .modal-content { width: 95%; }
        }
    </style>
</head>
<body>
    <div class="ea-bar">
        <span class="ea-logo">EA SPORTS</span>
        <span class="ea-sports-text">PRO CLUBS</span>
    </div>

    <header>
        <div class="logo-container">
            <img src="https://filipesep.github.io/BeagaFC/img/beaga.jpg" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="logo-simbolo" style="display: none;">BFC</div>
        </div>
        <h1>BEAGA FC</h1>
        <p class="subtitle">💜 Pro Clubs Team - 4 Jogadores | Roxo por Natureza 💜</p>
    </header>

    <section class="players-section">
        <h2>⭐ ELENCO PRINCIPAL</h2>
        <div class="cards-container" id="cardsContainer"></div>

        <div class="highlight-area" id="highlightArea"></div>
    </section>

    <footer>
        <p>BEAGA FC © 2026 - EA SPORTS Pro Clubs | #BFCFamily 💜</p>
    </footer>

    <!-- Modal do vídeo -->
    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-modal" onclick="fecharModal()">✕ FECHAR</button>
            </div>
            <div id="videoContainer" class="video-container"></div>
        </div>
    </div>

    <script>
        // ⚡ CONFIGURE AQUI OS DADOS DOS JOGADORES ⚡
        const players = [
            {
                id: 0,
                name: "Filipe",
                position: "Meia Armador",
                bio: "Craque da equipe, lider de assistencias. Conhecido pelos dribles desconcertantes e gols de fora da área.",
                photoUrl: "https://filipesep.github.io/BeagaFC/img/sab.jpg",
                videoUrl: "https://www.youtube.com/watch?v=SEU_LANCE_FILIPE",
                videoTipo: "youtube",
            },
            {
                id: 1,
                name: "Elias, O Paraiba",
                position: "Box-to-Box",
                bio: "Cérebro do time. Visão de jogo apurada e passes milimétricos. Responsável por ditar o ritmo das partidas e equilibrar o ataque e a defesa.",
                photoUrl: "https://filipesep.github.io/BeagaFC/img/par.jpg",
                videoUrl: "https://www.youtube.com/watch?v=SEU_LANCE_2",
                videoTipo: "youtube"
            },
            {
                id: 2,
                name: "Marcelo",
                position: "Nosso 9 matador",
                bio: "Artilheiro nato. Sempre no lugar certo na hora certa. Goleador do time, conhecido por suas finalizações precisas e frieza na frente do gol.",
                photoUrl: "https://filipesep.github.io/BeagaFC/img/mar.jpg",
                videoUrl: "https://www.youtube.com/watch?v=SEU_LANCE_3",
                videoTipo: "youtube"        
            },
            {
                id: 3,
                name: "Gaucho",
                position: "Meia esquerda",
                bio: "Horrivel, normalmente mais atrapalha do que ajuda, mas tá sempre na resenha. Se toda partida fosse de acesso, ele seria um Deus!",
                photoUrl: "https://filipesep.github.io/BeagaFC/img/gau.jpg",
                videoUrl: "https://www.youtube.com/watch?v=SEU_LANCE_4",
                videoTipo: "youtube"
            }
        ];

        let activePlayerId = 0;

        function getPhotoOrPlaceholder(player) {
            if (player.photoUrl && player.photoUrl.trim() !== "") {
                return `<img src="${player.photoUrl}" alt="${player.name}">`;
            } else {
                return `<div class="player-placeholder">${player.placeholderIcon}</div>`;
            }
        }

        function getDetailPhoto(player) {
            if (player.photoUrl && player.photoUrl.trim() !== "") {
                return `<img src="${player.photoUrl}" alt="${player.name}">`;
            } else {
                return `<div class="placeholder-photo">${player.placeholderIcon}</div>`;
            }
        }

        function abrirVideo(player) {
            const modal = document.getElementById('videoModal');
            const videoContainer = document.getElementById('videoContainer');
            
            if (!player.videoUrl || player.videoUrl === "" || player.videoUrl.includes("SEU_LANCE")) {
                videoContainer.innerHTML = '<p style="color:#888; text-align:center; padding: 50px;">🎬 Nenhum lance cadastrado ainda. Configure o videoUrl!</p>';
            } else if (player.videoTipo === "youtube") {
                // Converte URL do YouTube para embed
                let embedUrl = player.videoUrl;
                if (embedUrl.includes("watch?v=")) {
                    embedUrl = embedUrl.replace("watch?v=", "embed/");
                }
                if (embedUrl.includes("youtu.be/")) {
                    embedUrl = embedUrl.replace("youtu.be/", "www.youtube.com/embed/");
                }
                videoContainer.innerHTML = `
                    <iframe 
                        width="100%" 
                        height="450" 
                        src="${embedUrl}?autoplay=1" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>`;
            } else {
                // Vídeo local
                videoContainer.innerHTML = `
                    <video width="100%" controls autoplay style="border-radius: 15px;">
                        <source src="${player.videoUrl}" type="video/mp4">
                        Seu navegador não suporta vídeo.
                    </video>`;
            }
            
            modal.style.display = "flex";
        }

        function fecharModal() {
            document.getElementById('videoModal').style.display = "none";
            document.getElementById('videoContainer').innerHTML = "";
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = players.map(player => `
                <div class="player-card ${activePlayerId === player.id ? 'active' : ''}" data-id="${player.id}">
                    ${getPhotoOrPlaceholder(player)}
                    <h3>${player.name}</h3>
                    <p>${player.position}</p>
                </div>
            `).join('');

            document.querySelectorAll('.player-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    setActivePlayer(id);
                });
            });
        }

        function setActivePlayer(id) {
            activePlayerId = id;
            renderCards();
            renderHighlight();
        }

        function renderHighlight() {
            const player = players[activePlayerId];
            const highlightDiv = document.getElementById('highlightArea');
            
            highlightDiv.innerHTML = `
                <div class="player-detail">
                    <div class="detail-photo">
                        ${getDetailPhoto(player)}
                    </div>
                    <div class="detail-info">
                        <h3>${player.name}</h3>
                        <div class="detail-pos">${player.position}</div>
                        <div class="detail-bio">${player.bio}</div>
                        <button onclick="abrirVideo(players[${activePlayerId}])" class="highlight-link">
                            🎬 VER LANCE ➔
                        </button>
                    </div>
                </div>
            `;
        }

        renderCards();
        renderHighlight();

        // Logo fallback
        const logoImg = document.querySelector('.logo-img');
        const logoSymbol = document.querySelector('.logo-simbolo');
        if (logoImg.complete && logoImg.naturalWidth === 0) {
            logoImg.style.display = 'none';
            logoSymbol.style.display = 'flex';
        }
        logoImg.onerror = function() {
            logoImg.style.display = 'none';
            logoSymbol.style.display = 'flex';
        };
    </script>
</body>
</html>
